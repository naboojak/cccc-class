<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cccc class</title>
<style>
  :root { --bg:#FFFFFF; --surface:#FAFAFA; --surface2:#FFFFFF; --border:#EFEFEF; --text:#1A1A1A; --text-sub:#6B6860; --text-muted:#A09E99; --accent:#534AB7; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:480px;margin:0 auto;padding:0 0 4rem;}
  .app-header{padding:.85rem 1.25rem;border-bottom:0.5px solid var(--border);background:var(--surface2);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;}
  .app-title{font-size:16px;font-weight:600;}
  .sync-wrap{display:flex;align-items:center;gap:5px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .35s;}
  .sync-dot.saving{background:#EF9F27;}
  .sync-dot.saved{background:#5CB85C;}
  .sync-dot.error{background:#E53935;}
  .sync-label{font-size:11px;color:var(--text-muted);}
  .tab-row{display:flex;background:var(--surface2);border-bottom:0.5px solid var(--border);position:sticky;top:46px;z-index:9;}
  .tab{flex:1;padding:0.65rem;font-size:13px;text-align:center;color:var(--text-muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;}
  .tab.active{color:var(--text);border-bottom:2px solid var(--text);font-weight:500;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;padding:0.6rem 1.25rem;background:var(--surface2);border-bottom:0.5px solid var(--border);align-items:center;}
  .legend-item{font-size:11px;color:var(--text-sub);display:flex;align-items:center;gap:3px;}
  .pill-tip{color:#f20fb6;font-weight:600;font-size:11px;}
  .mark-symbol{color:#90f20f;}
  .entry-list{padding:1rem 1.25rem;display:flex;flex-direction:column;gap:0.6rem;}
  .entry-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:0.9rem 1rem;cursor:pointer;transition:border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;}
  .entry-card:active{transform:scale(0.98);}
  .entry-card:hover{border-color:#D0CEC9;}
  .entry-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
  .entry-num{font-size:13px;font-weight:600;}
  .entry-date{font-size:12px;color:var(--text-muted);flex-shrink:0;}
  .entry-dots{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
  .dlabel{font-size:10px;color:var(--text-muted);margin-right:1px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .d-done{background:#C0BEB8;}
  .d-today{background:#1A1A1A;}
  .d-empty{background:transparent;border:1px solid #D0CEC9;}
  .dsep{width:10px;display:inline-block;}
  .entry-preview{font-size:12px;color:var(--text-sub);}
  .hw-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#EF9F27;margin-right:4px;vertical-align:middle;}
  .detail-view{display:none;padding:0 1.25rem;}
  .detail-view.active{display:block;}
  .back-btn{position:sticky;top:90px;z-index:8;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--accent);background:var(--surface);border:0.5px solid var(--border);border-radius:10px;cursor:pointer;padding:0.55rem 1rem;margin:.5rem 0;-webkit-tap-highlight-color:transparent;width:100%;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  .back-btn svg{width:16px;height:16px;}
  /* 목록 정렬 버튼 */
  .list-header{display:flex;align-items:center;justify-content:flex-end;padding:.5rem 1.25rem .1rem;}
  .sort-btn{font-size:12px;color:var(--text-sub);background:var(--surface2);border:0.5px solid var(--border);border-radius:20px;padding:4px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .sort-btn:active{opacity:.7;}
  .detail-num{font-size:17px;font-weight:600;margin-bottom:2px;}
  .detail-meta{font-size:12px;color:var(--text-muted);margin-bottom:8px;}
  .detail-dots{display:flex;align-items:center;gap:4px;margin-bottom:1rem;flex-wrap:wrap;}
  .blog-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);text-decoration:none;margin-bottom:1.25rem;padding:0.4rem 0.75rem;border:0.5px solid #D0CEEF;border-radius:20px;background:#F5F4FE;}
  .journal-body{font-size:14px;line-height:2;color:var(--text);white-space:pre-wrap;}
  .mark{display:inline;font-size:13px;font-weight:600;line-height:1.8;}
  .mark-tip{color:#f20fb6;}
  .mark-warn{color:var(--text);}
  .section-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;}
  .section-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
  .section-label-row .section-label{margin-bottom:0;}
  .section-block{background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:.9rem 1rem;margin-bottom:1rem;}
  /* 기존 hw-item (인접형제 경계선) */
  .hw-item{display:flex;align-items:center;gap:10px;padding:.45rem 0;font-size:14px;color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .hw-item+.hw-item{border-top:0.5px solid var(--border);}
  .hw-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
  .hw-item.done span{text-decoration:line-through;color:var(--text-muted);}
  .add-area{padding:0 1.25rem;}
  .add-btn{width:100%;padding:.8rem;border:0.5px dashed var(--border);border-radius:12px;background:none;color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .12s;}
  .add-btn:hover{background:var(--surface);color:var(--text-sub);}
  /* 비용/스케줄 탭 */
  .tab-view{display:none;padding:1rem 1.25rem;}
  .tab-view.active{display:block;}
  .cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}
  .cost-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:.9rem 1rem;}
  .cost-card-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
  .cost-card-value{font-size:20px;font-weight:600;}
  .cost-card-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .progress-wrap{margin-bottom:1rem;}
  .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-sub);margin-bottom:6px;}
  .progress-bg{background:var(--border);border-radius:4px;height:5px;}
  .progress-fill{background:var(--text);border-radius:4px;height:5px;}
  .cost-row{display:flex;align-items:center;justify-content:space-between;padding:.65rem 0;font-size:13px;border-bottom:0.5px solid var(--border);}
  .cost-row:last-child{border-bottom:none;}
  .cost-row-left{display:flex;flex-direction:column;gap:2px;}
  .cost-row-date{font-size:11px;color:var(--text-muted);}
  .cost-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#EAF3DE;color:#27500A;}
  .cost-upcoming{font-size:10px;padding:2px 7px;border-radius:20px;background:#FAEEDA;color:#633806;}
  /* 스케줄 */
  .schedule-row{display:flex;align-items:flex-start;gap:12px;padding:.75rem 0;border-bottom:0.5px solid var(--border);}
  .schedule-row:last-child{border-bottom:none;}
  .schedule-date-col{min-width:64px;flex-shrink:0;}
  .schedule-date{font-size:13px;font-weight:500;}
  .schedule-day{font-size:11px;color:var(--text-muted);}
  .schedule-content{flex:1;}
  .schedule-title{font-size:13px;color:var(--text);}
  .schedule-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .schedule-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-top:3px;}
  .badge-lesson{background:#F5F4FE;color:#534AB7;}
  .badge-pay{background:#FAEEDA;color:#633806;}
  .badge-done{background:#F0F0F0;color:#888;}

  /* ===== 편집 기능 추가 CSS ===== */
  .edit-sm{font-size:11px;color:var(--accent);border:0.5px solid #D0CEEF;border-radius:20px;background:#F5F4FE;padding:3px 10px;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0;}
  .edit-sm:active{opacity:.7;}

  /* 할 일 */
  .todo-wrap{display:flex;align-items:center;border-top:0.5px solid var(--border);}
  .todo-wrap:first-of-type{border-top:none;}
  .todo-wrap .hw-item{flex:1;border-top:none !important;}
  .todo-del{width:32px;height:40px;border:none;background:none;color:var(--text-muted);font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;line-height:1;padding:0;}
  .todo-del:active{color:#E53935;}
  .add-todo-btn{width:100%;padding:.5rem;border:0.5px dashed var(--border);border-radius:10px;background:none;color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:.5rem;-webkit-tap-highlight-color:transparent;}
  .add-todo-btn:active{background:var(--surface);}
  .new-todo-row{display:flex;gap:6px;margin-top:.5rem;padding-top:.5rem;border-top:0.5px solid var(--border);}
  .new-todo-inp{flex:1;border:0.5px solid var(--accent);border-radius:8px;padding:.4rem .65rem;font-size:14px;outline:none;font-family:inherit;color:var(--text);background:white;}
  .new-todo-ok{background:var(--accent);color:white;border:none;border-radius:8px;padding:.4rem .75rem;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
  .new-todo-x{background:var(--surface);color:var(--text-sub);border:0.5px solid var(--border);border-radius:8px;padding:.4rem .6rem;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

  /* 할 일 순서 변경 + 텍스트 편집 */
  .todo-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;}
  .todo-move{width:26px;height:38px;border:none;background:none;color:var(--text-muted);font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;-webkit-tap-highlight-color:transparent;line-height:1;}
  .todo-move:disabled{opacity:.2;cursor:default;}
  .todo-move:not(:disabled):active{color:var(--accent);}
  .todo-edit-btn{font-size:11px;color:var(--accent);border:0.5px solid #D0CEEF;border-radius:20px;background:#F5F4FE;padding:2px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0;line-height:1.6;}
  .todo-edit-btn:active{opacity:.7;}
  /* 드래그 핸들 */
  .drag-handle{display:flex;align-items:center;padding:0 8px 0 2px;color:#CCC;cursor:grab;flex-shrink:0;user-select:none;-webkit-user-select:none;}
  .drag-handle:active{cursor:grabbing;color:var(--text-muted);}
  .todo-drag-ghost{opacity:.35;background:var(--surface);border-color:var(--accent) !important;border-radius:12px;}
  .todo-edit-row{display:flex;gap:5px;padding:.4rem 0;align-items:center;width:100%;}
  .todo-edit-inp{flex:1;border:0.5px solid var(--accent);border-radius:8px;padding:.35rem .6rem;font-size:14px;outline:none;font-family:inherit;color:var(--text);background:white;min-width:0;}
  .todo-edit-ok{background:var(--accent);color:white;border:none;border-radius:8px;padding:.35rem .65rem;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
  .todo-edit-x2{background:var(--surface);color:var(--text-sub);border:0.5px solid var(--border);border-radius:8px;padding:.35rem .55rem;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;}

  /* 본문 마크 타입 */
  .mark-important{color:#f20fb6;}
  .mark-warning{color:var(--text);border-bottom:1.5px solid #90f20f;}
  .mark-review{color:#9429c2;}
  .mark-question{color:#2d4bf7;}
  /* 본문 편집기 */
  .body-editor{min-height:120px;border:0.5px solid var(--accent);border-radius:8px;padding:.75rem;font-size:14px;line-height:2;outline:none;font-family:inherit;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:.5rem;background:white;}
  /* 본문 툴바 */
  .body-toolbar{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:.5rem;position:sticky;top:135px;z-index:7;background:var(--surface2);padding:.4rem .1rem;border-radius:8px;}
  .toolbar-btn{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface2);color:var(--text-sub);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
  .toolbar-btn:active{opacity:.7;}
  /* 형광펜 */
  .mark-hl-1{background:#96fff5;border-radius:2px;}
  .mark-hl-2{background:#fdffa3;border-radius:2px;}
  .mark-hl-3{background:#dcffa3;border-radius:2px;}
  .hl-swatch{background:transparent;border:none;padding:7px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;display:inline-flex;align-items:center;justify-content:center;}
  .hl-swatch::before{content:'';display:block;width:10px;height:10px;border-radius:2px;border:0.5px solid rgba(0,0,0,.15);}
  .hl-swatch-1::before{background:#96fff5;}
  .hl-swatch-2::before{background:#fdffa3;}
  .hl-swatch-3::before{background:#dcffa3;}
  .tb-bold{font-weight:700;}
  .tb-important{color:#f20fb6;border-color:#f9c8ed;background:#fef0fa;}
  .tb-warning{color:var(--text-sub);border-color:#c8e8a0;background:#f3fce8;}
  .tb-review{color:#9429c2;border-color:#e0b0f5;background:#f9effe;}
  .tb-question{color:#2d4bf7;border-color:#c0cafd;background:#eef0fe;}

  /* 메모/내용 편집기 */
  .inline-ta{width:100%;border:0.5px solid var(--accent);border-radius:8px;padding:.6rem .75rem;font-size:14px;line-height:1.9;resize:vertical;outline:none;font-family:inherit;color:var(--text);background:white;min-height:90px;margin-bottom:.5rem;display:block;}
  .editor-btns{display:flex;gap:6px;justify-content:center;}
  .editor-btns button{padding:.4rem .9rem;border-radius:8px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .btn-save{background:var(--accent);color:white;border:none;}
  .btn-cancel{background:var(--surface);color:var(--text-sub);border:0.5px solid var(--border);}
  /* 로그인 화면 */
  #login-screen{display:none;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
  .login-wrap{width:100%;max-width:360px;padding:2.5rem 1.5rem;}
  .login-title{font-size:20px;font-weight:700;color:var(--text);text-align:center;margin-bottom:.3rem;}
  .login-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:2rem;}
  .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:white;color:#3c4043;border:1px solid #dadce0;border-radius:10px;padding:.8rem 1rem;font-size:15px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .google-btn:active{background:#f8f8f8;}
  .login-err{font-size:13px;color:#E53935;text-align:center;margin-top:.75rem;min-height:18px;}
  /* 로그아웃 버튼 */
  .logout-btn{font-size:12px;color:var(--text-muted);background:none;border:0.5px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .logout-btn:active{opacity:.7;}
  /* 앱 화면 (기본 숨김) */
  #app-screen{display:none;}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-title">cccc class</div>
    <div class="login-sub">수업 기록을 시작하세요</div>
    <button class="google-btn" id="google-login-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0;"><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v8.51h12.93c-.56 2.99-2.26 5.52-4.81 7.22l7.74 6.01c4.51-4.16 7.12-10.28 7.12-17.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.9-5.82l-7.74-6.01c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.16C6.51 42.68 14.62 48 24 48z"/><path fill="#FBBC05" d="M10.53 28.56A14.96 14.96 0 0 1 9.5 24c0-1.58.27-3.12.76-4.56l-7.98-6.16A23.94 23.94 0 0 0 0 24c0 3.77.9 7.34 2.46 10.51l8.07-5.95z"/><path fill="#EA4335" d="M24 9.52c3.53 0 6.69 1.21 9.18 3.59l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.32 2.46 13.28l7.98 6.16C12.43 13.74 17.74 9.52 24 9.52z"/></svg>
      Google로 로그인
    </button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen">
<div class="app">
  <div class="app-header">
    <span class="app-title">cccc class</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="sync-wrap">
        <span id="sync-dot" class="sync-dot"></span>
        <span id="sync-label" class="sync-label"></span>
      </div>
      <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab active" onclick="switchTab('journal')">수업일지</button>
    <button class="tab" onclick="switchTab('cost')">비용</button>
    <button class="tab" onclick="switchTab('schedule')">스케줄</button>
  </div>

  <!-- 수업일지 탭 -->
  <div id="tab-journal" class="tab-view active" style="padding:0;">
    <div class="legend">
      <div class="legend-item"><span class="mark-important">✸</span>중요</div>
      <div class="legend-item"><span class="mark-warning">∨</span>주의</div>
      <div class="legend-item"><span class="mark-review">↺</span>다시보기</div>
      <div class="legend-item"><span class="mark-question">?</span>질문</div>
      <div class="legend-item"><span class="dot d-today"></span>당일</div>
      <div class="legend-item"><span class="dot d-done"></span>이전</div>
      <div class="legend-item"><span class="dot d-empty"></span>예정</div>
    </div>
    <div id="list-view">
      <div class="list-header">
        <button class="sort-btn" id="sort-btn" onclick="toggleSort()">오래된순 ↑</button>
      </div>
      <div class="entry-list" id="entry-list"></div>
      <div class="add-area">
        <button class="add-btn" onclick="alert('다음 수업 후 클로드에게 블로그 글 붙여넣으면 여기 추가돼요!')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          다음 수업 후 추가
        </button>
      </div>
    </div>
    <div id="detail-container"></div>
  </div>

  <!-- 비용 탭 -->
  <div id="tab-cost" class="tab-view">
    <div class="cost-grid">
      <div class="cost-card">
        <div class="cost-card-label">총 결제</div>
        <div class="cost-card-value">180만원</div>
        <div class="cost-card-sub">3회차 완료</div>
      </div>
      <div class="cost-card">
        <div class="cost-card-label">수강 진도</div>
        <div class="cost-card-value">9강</div>
        <div class="cost-card-sub">결제 기준 12강 중</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>3회차 진도</span><span>9 / 12강</span></div>
      <div class="progress-bg"><div class="progress-fill" style="width:75%"></div></div>
    </div>
    <div class="section-label">결제 내역</div>
    <div class="section-block">

// 본문 편집: 선택 범위 저장
var savedBodyRange = null;
var currentBodyEntryId = null;

// ===== 유틸 함수 =====
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// HTML → plain text (줄바꿈 보존)
function htmlToText(html) {
  var d = document.createElement('div');
  d.innerHTML = html;
  // <br>을 \n으로 교체
  d.querySelectorAll('br').forEach(function(br) {
    br.parentNode.replaceChild(document.createTextNode('\n'), br);
  });
  // 줄 앞뒤 공백 제거 후 연속 줄바꿈 모두 1개로 정리 (메모는 컴팩트하게)
  return d.textContent.replace(/[ \t]*\n[ \t]*/g, '\n').replace(/\n{2,}/g, '\n').trim();
}

// 본문 HTML 새니타이저 (허용: <strong>, <br>, <span class="mark-*">)
var ALLOWED_MARK_CLASSES = ['mark-important','mark-warning','mark-review','mark-question','mark-hl-1','mark-hl-2','mark-hl-3'];
function walkNodes(el, out) {
  el.childNodes.forEach(function(node) {
    if (node.nodeType === 3) { // 텍스트
      out.push(document.createTextNode(node.textContent));
    } else if (node.nodeType === 1) {
      var tag = node.tagName;
      if (tag === 'BR') {
        out.push(document.createElement('br'));
      } else if (tag === 'STRONG' || tag === 'B') {
        var s = document.createElement('strong');
        walkNodes(node, Array.prototype); // collect children into s
        var inner = []; walkNodes(node, inner);
        inner.forEach(function(c){ s.appendChild(c); });
        out.push(s);
      } else if (tag === 'SPAN') {
        var cls = node.className || '';
        if (ALLOWED_MARK_CLASSES.indexOf(cls) !== -1) {
          var sp = document.createElement('span');
          sp.className = cls;
          var inner2 = []; walkNodes(node, inner2);
          inner2.forEach(function(c){ sp.appendChild(c); });
          out.push(sp);
        } else {
          walkNodes(node, out); // unwrap unknown spans
        }
      } else {
        walkNodes(node, out); // unwrap other tags
      }
    }
  });
}
function sanitizeBody(html) {
  var src = document.createElement('div');
  src.innerHTML = html;
  var out = [];
  walkNodes(src, out);
  var wrap = document.createElement('div');
  out.forEach(function(n){ wrap.appendChild(n); });
  return wrap.innerHTML;
}

// 본문 편집 선택 저장/복원
function saveBodySelection() {
  var sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    savedBodyRange = sel.getRangeAt(0).cloneRange();
  }
}
function restoreBodySelection() {
  if (!savedBodyRange) return;
  var sel = window.getSelection();
  if (sel) { sel.removeAllRanges(); sel.addRange(savedBodyRange); }
}

function initStates() {
  entries.forEach(function(e) {
    states[e.id] = {
      todos: e.todos.map(function(t) { return { text: t, checked: false }; }),
      memo: e.memo ? htmlToText(e.memo) : null,
      body: e.body || null
    };
  });
}

// ===== 동기화 상태 표시 =====
function setSyncStatus(status, label) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-label');
  if (!dot) return;
  dot.className = 'sync-dot' + (status ? ' ' + status : '');
  if (lbl) lbl.textContent = label || '';
  if (status === 'saved') {
    setTimeout(function() {
      dot.className = 'sync-dot';
      if (lbl) lbl.textContent = '';
    }, 2000);
  }
}

// ===== Supabase 불러오기 =====
async function loadFromDB() {
  if (!db) return;
  try {
    setSyncStatus('saving', '불러오는 중');
    var result = await db.from('entries_state').select('*');
    if (result.error) throw result.error;
    if (result.data) {
      result.data.forEach(function(row) {
        var s = states[row.entry_id];
        if (!s) return;
        if (Array.isArray(row.todos) && row.todos.length > 0) {
          s.todos = row.todos;
        }
        if (row.memo !== null && row.memo !== undefined) {
          s.memo = htmlToText(row.memo);
        }
        if (row.body !== null && row.body !== undefined) {
          s.body = row.body;
        }
      });
    }
    setSyncStatus('saved', '');
    // 동적 섹션 재렌더
    entries.forEach(function(e) {
      renderTodosSection(e.id);
      renderMemoSection(e.id);
      renderBodySection(e.id, false);
    });
  } catch(err) {
    console.warn('DB 불러오기 실패 (오프라인 모드):', err);
    setSyncStatus('error', '오프라인');
    setTimeout(function() { setSyncStatus('', ''); }, 3000);
  }
}

// ===== Supabase 저장 =====
async function saveToDB(entryId) {
  if (!db) return;
  setSyncStatus('saving', '저장 중');
  try {
    var s = states[entryId];
    var result = await db.from('entries_state').upsert({
      entry_id: entryId,
      user_id: currentUser ? currentUser.id : null,
      todos: s.todos,
      memo: s.memo,
      body: s.body,
      updated_at: new Date().toISOString()
    }, { onConflict: 'entry_id' });
    if (result.error) throw result.error;
    setSyncStatus('saved', '저장됨');
  } catch(err) {
    console.error('DB 저장 실패:', err);
    setSyncStatus('error', '저장 실패');
  }
}

// ===== 할 일 기능 =====
function toggleTodo(entryId, idx) {
  var t = states[entryId].todos[idx];
  if (!t) return;
  t.checked = !t.checked;
  renderTodosSection(entryId);
  saveToDB(entryId);
}

function deleteTodo(entryId, idx) {
  todoEditState[entryId] = null; // 편집 중이면 초기화
  states[entryId].todos.splice(idx, 1);
  renderTodosSection(entryId);
  saveToDB(entryId);
}

// ===== 할 일 텍스트 편집 =====
function editTodo(entryId, idx) {
  todoEditState[entryId] = idx;
  renderTodosSection(entryId);
}
function cancelEditTodo(entryId) {
  todoEditState[entryId] = null;
  renderTodosSection(entryId);
}
function saveEditTodo(entryId, idx) {
  var inp = document.getElementById('edit-todo-inp-' + entryId + '-' + idx);
  if (!inp) return;
  var text = inp.value.trim();

  renderTodosSection(entryId);

// ===== 드래그 정렬 초기화 =====
function initSortable(entryId) {
  if (typeof Sortable === 'undefined') return;
  var list = document.getElementById('todos-list-' + entryId);
  if (!list) return;
  if (sortableInstances[entryId]) {
    try { sortableInstances[entryId].destroy(); } catch(e) {}
  }
  sortableInstances[entryId] = new Sortable(list, {
    animation: 150,
    handle: '.drag-handle',
    ghostClass: 'todo-drag-ghost',
    onEnd: function() {
      var items = list.querySelectorAll('.todo-wrap[data-idx]');
      var snap = states[entryId].todos.slice();
      var newTodos = [];
      items.forEach(function(el) {
        var i = parseInt(el.getAttribute('data-idx'), 10);
        if (!isNaN(i)) newTodos.push(snap[i]);
      });
      states[entryId].todos = newTodos;
      renderTodosSection(entryId);
      saveToDB(entryId);
    }
  });
}

function showAddTodo(entryId) {
  var row = document.getElementById('new-todo-row-' + entryId);
  var inp = document.getElementById('new-todo-inp-' + entryId);
  if (row) { row.style.display = 'flex'; if (inp) { inp.value = ''; inp.focus(); } }
}
function hideAddTodo(entryId) {
  var row = document.getElementById('new-todo-row-' + entryId);
  if (row) row.style.display = 'none';
}
function confirmAddTodo(entryId) {
  var inp = document.getElementById('new-todo-inp-' + entryId);
  if (!inp) return;
  var text = inp.value.trim();
  if (!text) { hideAddTodo(entryId); return; }
  states[entryId].todos.push({ text: text, checked: false });
  renderTodosSection(entryId);
  saveToDB(entryId);
}

  var editingIdx = (todoEditState[entryId] != null) ? todoEditState[entryId] : -1;

  // ── 정렬 가능한 항목 목록 ──
  var listHtml = '';
  if (todos.length === 0) {
    listHtml = '<div style="font-size:13px;color:var(--text-muted);padding:.4rem 0;">할 일 없음</div>';
  } else {
    todos.forEach(function(t, i) {
      if (i === editingIdx) {
        // 편집 모드 (드래그 핸들 숨김)
        listHtml += '<div class="todo-wrap" data-idx="' + i + '">' +
          '<div class="todo-edit-row">' +
            '<input class="todo-edit-inp" id="edit-todo-inp-' + entryId + '-' + i + '" type="text" value="' + esc(t.text) + '" ' +
              'onkeydown="if(event.key===\'Enter\')saveEditTodo(' + entryId + ',' + i + ');else if(event.key===\'Escape\')cancelEditTodo(' + entryId + ')">' +
            '<button class="todo-edit-ok" onclick="saveEditTodo(' + entryId + ',' + i + ')">저장</button>' +
            '<button class="todo-edit-x2" onclick="cancelEditTodo(' + entryId + ')">취소</button>' +
          '</div>' +
        '</div>';
      } else {
        // 일반 모드 (드래그 핸들 표시)
        listHtml += '<div class="todo-wrap" data-idx="' + i + '">' +
          '<span class="drag-handle">' +
            '<svg width="12" height="16" viewBox="0 0 12 16" fill="currentColor">' +
              '<circle cx="4" cy="4" r="1.5"/><circle cx="8" cy="4" r="1.5"/>' +
              '<circle cx="4" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/>' +
              '<circle cx="4" cy="12" r="1.5"/><circle cx="8" cy="12" r="1.5"/>' +
            '</svg>' +
          '</span>' +
          '<label class="hw-item' + (t.checked ? ' done' : '') + '" onclick="toggleTodo(' + entryId + ',' + i + ')">' +
            '<input type="checkbox"' + (t.checked ? ' checked' : '') + '>' +
            '<span>' + esc(t.text) + '</span>' +
          '</label>' +
          '<div class="todo-actions">' +
            '<button class="todo-edit-btn" onclick="event.stopPropagation();editTodo(' + entryId + ',' + i + ')">편집</button>' +
            '<button class="todo-del" onclick="event.stopPropagation();deleteTodo(' + entryId + ',' + i + ')">×</button>' +
          '</div>' +
        '</div>';
      }
    });
  }

  var html =
    '<div id="todos-list-' + entryId + '">' + listHtml + '</div>' +
    '<button class="add-todo-btn" onclick="showAddTodo(' + entryId + ')">＋ 할 일 추가</button>' +
    '<div id="new-todo-row-' + entryId + '" class="new-todo-row" style="display:none;">' +
      '<input class="new-todo-inp" id="new-todo-inp-' + entryId + '" type="text" placeholder="새 할 일 입력" ' +
        'onkeydown="if(event.key===\'Enter\')confirmAddTodo(' + entryId + ');else if(event.key===\'Escape\')hideAddTodo(' + entryId + ')">' +
      '<button class="new-todo-ok" onclick="confirmAddTodo(' + entryId + ')">추가</button>' +
      '<button class="new-todo-x" onclick="hideAddTodo(' + entryId + ')">취소</button>' +

  // 편집 모드 포커스

// ===== 본문 편집 =====
function applyBodyMark(type) {
  restoreBodySelection();
  var sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
  if (type === 'bold') {
    document.execCommand('bold');
  } else {
    // insertHTML 방식 → undo 히스토리에 기록됨
    var cls = 'mark-' + type;
    var selectedText = sel.getRangeAt(0).toString();
    if (!selectedText) return;
    document.execCommand('insertHTML', false, '<span class="' + cls + '">' + selectedText.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>');
  }
}

function applyBodyHl(cls) {
  restoreBodySelection();
  var sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
  var selectedText = sel.getRangeAt(0).toString();
  if (!selectedText) return;
  document.execCommand('insertHTML', false, '<span class="' + cls + '">' + selectedText.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>');
}

function editBody(entryId) {

}
function cancelBody(entryId) {

}
function saveBody(entryId) {

          '<button class="toolbar-btn tb-warning" onpointerdown="saveBodySelection()" onclick="applyBodyMark(\'warning\')">∨ 주의</button>' +
          '<button class="toolbar-btn tb-review" onpointerdown="saveBodySelection()" onclick="applyBodyMark(\'review\')">↺ 다시보기</button>' +
          '<button class="toolbar-btn tb-question" onpointerdown="saveBodySelection()" onclick="applyBodyMark(\'question\')">? 질문</button>' +
          '<button class="hl-swatch hl-swatch-1" onpointerdown="saveBodySelection()" onclick="applyBodyHl(\'mark-hl-1\')" title="형광펜 1"></button>' +
          '<button class="hl-swatch hl-swatch-2" onpointerdown="saveBodySelection()" onclick="applyBodyHl(\'mark-hl-2\')" title="형광펜 2"></button>' +
          '<button class="hl-swatch hl-swatch-3" onpointerdown="saveBodySelection()" onclick="applyBodyHl(\'mark-hl-3\')" title="형광펜 3"></button>' +
        '</div>' +
        '<div class="body-editor" id="body-editor-' + entryId + '" contenteditable="true" onpaste="handleBodyPaste(event)"></div>' +
        '<div class="editor-btns">' +
          '<button class="btn-cancel" onclick="cancelBody(' + entryId + ')">취소</button>' +
          '<button class="btn-save" onclick="saveBody(' + entryId + ')">저장</button>' +

      if (sel) { sel.removeAllRanges(); sel.addRange(range); }
    }
  } else {
    outer.innerHTML =
      '<div class="section-label-row">' +

// 붙여넣기: plain text로 처리
function handleBodyPaste(e) {
  e.preventDefault();
  var text = (e.clipboardData || window.clipboardData).getData('text/plain');
  document.execCommand('insertText', false, text);
}

// ===== 동그라미 계산 =====
function buildDotsForEntry(entry, allEntries) {
  var prevTotal = 0;
  for (var i = 0; i < allEntries.length; i++) {
    if (allEntries[i].id === entry.id) break;
    prevTotal = allEntries[i].lessonTotal;
  }
  var total = entry.lessonTotal;
  var html = '';
  // 당일 수업에 해당하는 회차만 추출
  var termsInvolved = {};
  for (var j = prevTotal; j < total; j++) {
    var term = Math.floor(j / LESSONS_PER_TERM) + 1;
    if (!termsInvolved[term]) termsInvolved[term] = [];
    termsInvolved[term].push(j);
  }
  var sortedTerms = Object.keys(termsInvolved).map(Number).sort(function(a, b) { return a - b; });
  sortedTerms.forEach(function(term, idx) {
    if (idx > 0) html += '<span class="dsep"></span>';
    html += '<span class="dlabel">' + term + '회차</span>';
    var termStart = (term - 1) * LESSONS_PER_TERM;
    for (var k = termStart; k < termStart + LESSONS_PER_TERM; k++) {
      if (k >= total) { html += '<span class="dot d-empty"></span>'; }
      else if (k >= prevTotal) { html += '<span class="dot d-today"></span>'; }
      else { html += '<span class="dot d-done"></span>'; }
    }
  });
  return html;
}

// ===== 스케줄 렌더 =====
function renderSchedule() {
  var container = document.getElementById('tab-schedule');
  var lastMonth = null;
  var html = '';
  var currentBlock = '';
  schedule.forEach(function(item) {
    var month = parseInt(item.date.substring(2, 4), 10) + '월';
    if (month !== lastMonth) {
      if (currentBlock) {
        html += '<div class="section-block" style="margin-bottom:1rem;">' + currentBlock + '</div>';
        currentBlock = '';
      }
      html += '<div class="section-label">' + month + '</div>';
      lastMonth = month;
    }
    var day = getDayName(item.date);
    var badgeHtml = '';
    if (item.badge === 'done') badgeHtml = '<span class="schedule-badge badge-done">완료</span>';
    else if (item.badge === 'lesson') badgeHtml = '<span class="schedule-badge badge-lesson">예정</span>';
    else if (item.badge === 'pay') badgeHtml = '<span class="schedule-badge badge-pay">결제</span>';
    currentBlock +=
      '<div class="schedule-row">' +
        '<div class="schedule-date-col">' +
          '<div class="schedule-date">' + item.date + '</div>' +
          '<div class="schedule-day">' + day + '</div>' +
        '</div>' +
        '<div class="schedule-content">' +
          '<div class="schedule-title">' + item.title + '</div>' +
          '<div class="schedule-sub">' + item.sub + '</div>' +
          badgeHtml +
        '</div>' +
      '</div>';
  });
  if (currentBlock) {
    html += '<div class="section-block" style="margin-bottom:1rem;">' + currentBlock + '</div>';
  }
  container.innerHTML = html;
}

// ===== 목록 렌더 =====
function formatWriteDate(yymmdd) {
  if (!yymmdd || yymmdd.length !== 6) return yymmdd;
  var yy = yymmdd.slice(0,2), mm = yymmdd.slice(2,4), dd = yymmdd.slice(4,6);
  var days = ['일','월','화','수','목','금','토'];
  var dow = days[new Date('20'+yy+'-'+mm+'-'+dd).getDay()];
  return '20'+yy+'.'+mm+'.'+dd+' '+dow;
}

function renderList() {
  var list = document.getElementById('entry-list');
  list.innerHTML = '';
  var sorted = entries.slice().sort(function(a, b) {
    var na = parseInt(a.num, 10), nb = parseInt(b.num, 10);
    return listSortOrder === 'desc' ? nb - na : na - nb;
  });
  sorted.forEach(function(e) {
    var div = document.createElement('div');
    div.className = 'entry-card';
    div.onclick = function() { openEntry(e.id); };
    var preview = e.hwDot ? '<span class="hw-dot"></span>' + e.preview : e.preview;
    div.innerHTML =
      '<div class="entry-row1"><span class="entry-num">' + e.date + ' 수업일지 ' + e.num + '</span><span class="entry-date">작성 ' + formatWriteDate(e.writeDate) + '</span></div>' +
      '<div class="entry-dots">' + buildDotsForEntry(e, entries) + '</div>' +
      '<div class="entry-preview">' + preview + '</div>';
    list.appendChild(div);
  });
}

// ===== 상세 렌더 =====
function renderDetails() {
  var container = document.getElementById('detail-container');
  container.innerHTML = '';
  entries.forEach(function(e) {
    var div = document.createElement('div');
    div.id = 'detail-' + e.id;
    div.className = 'detail-view';
    div.innerHTML =
      '<button class="back-btn" onclick="closeEntry()">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>목록으로' +
      '</button>' +
      '<div class="detail-num">' + e.date + ' 수업일지 ' + e.num + '</div>' +
      '<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">작성일 ' + formatWriteDate(e.writeDate) + '</div>' +
      '<div class="detail-meta">' + e.preview + '</div>' +
      '<div class="detail-dots">' + buildDotsForEntry(e, entries) + '</div>' +
      '<a class="blog-link" href="' + e.blogUrl + '" target="_blank">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
        '네이버 블로그 원본' +
      '</a>' +
      // 내용 (동적 렌더)
      '<div id="body-container-' + e.id + '"></div>' +
      // 할 일 (동적 렌더)
      '<div class="section-label-row"><span class="section-label">다음 수업 전까지</span></div>' +
      '<div class="section-block" id="todos-section-' + e.id + '"></div>' +
      // 메모 (동적 렌더)
      '<div id="memo-container-' + e.id + '"></div>';
    container.appendChild(div);
    renderBodySection(e.id, false);
    renderTodosSection(e.id);
    renderMemoSection(e.id);
  });
}

// ===== 탭/네비 =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(el, i) {
    el.classList.toggle('active', ['journal','cost','schedule'][i] === tab);
  });
  ['journal','cost','schedule'].forEach(function(t) {
    var el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
}
function openEntry(id) {
  document.getElementById('list-view').style.display = 'none';
  document.querySelectorAll('.detail-view').forEach(function(el) { el.classList.remove('active'); });
  var d = document.getElementById('detail-' + id);
  if (d) d.classList.add('active');
  window.scrollTo(0, 0);
}
function closeEntry() {
  document.querySelectorAll('.detail-view').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0, 0);
}

// ===== 인증 함수 =====
function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
}
async function signOut() {
  if (!db) return;
  try { await db.auth.signOut(); } catch(e) {}
  currentUser = null;
  showLoginScreen();
}

// Google 로그인
async function signInWithGoogle() {
  if (!db) return;
  var btn = document.getElementById('google-login-btn');
  var errEl = document.getElementById('login-err');
  btn.disabled = true;
  errEl.textContent = '';
  try {
    var { error } = await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin }
    });
    if (error) throw error;
    // Google 페이지로 리디렉션 → 돌아오면 onAuthStateChange가 처리
  } catch(err) {
    errEl.textContent = '로그인 중 오류가 발생했습니다. 다시 시도해주세요.';
    btn.disabled = false;
  }
}

// ===== 초기화 =====
initStates();
document.getElementById('tab-cost').style.display = 'none';
document.getElementById('tab-schedule').style.display = 'none';
document.getElementById('tab-journal').style.display = 'block';
renderList();
renderDetails();
renderSchedule();

// 세션 감지 → 앱 진입 또는 로그인 화면 표시
if (db) {
  db.auth.onAuthStateChange(async function(event, session) {
    if (session && session.user) {
      currentUser = session.user;
      showApp();
      if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
        await loadFromDB();
      }
    } else {
      currentUser = null;
      showLoginScreen();
    }
  });
} else {
  // Supabase 미연결 (로컬 개발) → 바로 앱 진입
  showApp();
}
</script>
